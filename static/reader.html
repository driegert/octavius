<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Octavius — Reader</title>
<link rel="icon" type="image/png" href="/static/octavius-dapper_cyber_punk.png">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<link rel="manifest" href="/static/manifest.json">
<script src="/static/app-common.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
    background: #0a0a0f;
    color: #c8c8d0;
    min-height: 100vh;
    padding: 1.5rem 1rem;
    max-width: 448px;
    margin: 0 auto;
  }

  header {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 1.2rem;
  }

  header a {
    color: #555;
    text-decoration: none;
    font-size: 0.8rem;
    transition: color 0.2s;
  }
  header a:hover { color: #888; }

  header h1 {
    font-size: 1.1rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #6a6a7a;
    flex: 1;
  }

  /* Ingest bar */
  .ingest-bar {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 1.2rem;
  }

  .ingest-bar input {
    flex: 1;
    background: #151520;
    border: 1px solid #2a2a35;
    border-radius: 6px;
    color: #c8c8d0;
    font-family: inherit;
    font-size: 0.8rem;
    padding: 0.5rem 0.7rem;
    outline: none;
  }
  .ingest-bar input:focus { border-color: #60a0ff; }
  .ingest-bar input::placeholder { color: #444; }

  .ingest-bar button, .small-btn {
    background: #151520;
    border: 1px solid #2a2a35;
    border-radius: 6px;
    color: #888;
    padding: 0.5rem 0.7rem;
    font-size: 0.7rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    white-space: nowrap;
  }
  .ingest-bar button:hover, .small-btn:hover { border-color: #555; color: #ccc; }

  /* Document list */
  #doc-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .doc-card {
    background: #151520;
    border: 1px solid #2a2a35;
    border-radius: 6px;
    padding: 0.6rem 0.8rem;
    cursor: pointer;
    transition: border-color 0.2s;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .doc-card:hover { border-color: #60a0ff; }
  .doc-card { user-select: none; -webkit-user-select: none; }

  .doc-card .dc-title { flex: 1; font-size: 0.85rem; color: #d0d0e0; }
  .doc-card .dc-status {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 0.15rem 0.4rem;
    border-radius: 3px;
  }
  .dc-status.ready { color: #6abf6a; background: #1a2a1a; }
  .dc-status.processing { color: #bfa06a; background: #2a2a1a; }
  .dc-status.failed { color: #bf6a6a; background: #2a1a1a; }

  .doc-card .dc-delete {
    background: none;
    border: none;
    color: #444;
    font-size: 0.9rem;
    cursor: pointer;
    padding: 0.2rem;
    transition: color 0.2s;
  }
  .doc-card .dc-delete:hover { color: #bf6a6a; }

  .doc-card .dc-retry {
    background: none;
    border: none;
    color: #6a8fbf;
    font-size: 0.7rem;
    cursor: pointer;
    padding: 0.2rem 0.35rem;
    transition: color 0.2s;
  }
  .doc-card .dc-retry:hover { color: #9bc0ff; }

  .empty-state {
    text-align: center;
    color: #555;
    font-size: 0.85rem;
    padding: 2rem 0;
  }

  /* Player view */
  #player {
    display: none;
  }
  #player.active { display: block; }

  #player-title {
    font-size: 1rem;
    color: #d0d0e0;
    margin-bottom: 0.8rem;
    text-align: center;
  }

  #player-back {
    font-size: 0.75rem;
    color: #555;
    cursor: pointer;
    margin-bottom: 0.6rem;
    display: inline-block;
  }
  #player-back:hover { color: #888; }

  /* Section list */
  #sections {
    max-height: 30vh;
    overflow-y: auto;
    margin-bottom: 1rem;
    border: 1px solid #2a2a35;
    border-radius: 6px;
  }

  .section-item {
    padding: 0.45rem 0.7rem;
    font-size: 0.78rem;
    color: #888;
    cursor: pointer;
    border-bottom: 1px solid #1a1a25;
    transition: all 0.15s;
  }
  .section-item:last-child { border-bottom: none; }
  .section-item:hover { background: #1a1a25; color: #ccc; }
  .section-item.active { background: #1a1a2a; color: #60a0ff; }

  /* Progress bar */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.8rem;
  }

  #progress-bar {
    flex: 1;
    accent-color: #60a0ff;
    cursor: pointer;
    height: 6px;
  }

  .progress-label {
    font-size: 0.65rem;
    color: #555;
    min-width: 3.5em;
    text-align: right;
  }

  /* Transport controls */
  .transport {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 0.8rem;
  }

  .transport button {
    background: #151520;
    border: 1.5px solid #2a2a35;
    border-radius: 50%;
    color: #888;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .transport button:hover { border-color: #555; color: #ccc; }

  .transport .skip-btn {
    width: 36px;
    height: 36px;
    font-size: 0.8rem;
  }

  #play-pause-btn {
    width: 52px;
    height: 52px;
    font-size: 1.2rem;
    border-color: #60a0ff;
    color: #60a0ff;
  }
  #play-pause-btn:hover { background: #1a1a2a; }


  /* Settings row */
  .settings-row {
    display: flex;
    gap: 0.6rem;
    align-items: center;
    margin-bottom: 1rem;
  }

  .settings-row label {
    font-size: 0.65rem;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .settings-row select, .settings-row input[type="range"] {
    background: #151520;
    border: 1px solid #2a2a35;
    border-radius: 4px;
    color: #c8c8d0;
    font-family: inherit;
    font-size: 0.8rem;
    padding: 0.3rem;
    cursor: pointer;
  }

  .settings-row .speed-val {
    font-size: 0.75rem;
    color: #8888a0;
    min-width: 2.5em;
  }

  /* Read-along text */
  #read-along {
    background: #151520;
    border: 1px solid #2a2a35;
    border-radius: 6px;
    padding: 0.8rem;
    font-size: 0.82rem;
    line-height: 1.55;
    color: #999;
    min-height: 4em;
    max-height: 20vh;
    overflow-y: auto;
  }

  #read-along .current-sentence {
    color: #e0e0f0;
    font-weight: 500;
  }
</style>
</head>
<body>

<header>
  <a href="/">&larr; Octavius</a>
  <h1>Reader</h1>
</header>

<!-- Document list view -->
<div id="list-view">
  <div class="ingest-bar">
    <input type="text" id="ingest-input" placeholder="File path or URL...">
    <button id="ingest-btn">Add</button>
  </div>
  <div id="doc-list"></div>
</div>

<!-- Player view -->
<div id="player">
  <span id="player-back">&larr; Back to list</span>
  <div id="player-title"></div>

  <div id="sections"></div>

  <div class="progress-row">
    <span class="progress-label" id="progress-current">0</span>
    <input type="range" id="progress-bar" min="0" max="100" value="0">
    <span class="progress-label" id="progress-total">0</span>
  </div>

  <div class="transport">
    <button class="skip-btn" id="skip-back" title="Previous section">&#9198;</button>
    <button id="play-pause-btn" title="Play">&#9654;</button>
    <button class="skip-btn" id="skip-fwd" title="Next section">&#9197;</button>
  </div>

  <div class="settings-row">
    <label>Speed</label>
    <input type="range" id="reader-speed" min="1.0" max="2.0" step="0.1" value="1.4">
    <span class="speed-val" id="reader-speed-val">1.4x</span>
    <label>Voice</label>
    <select id="reader-voice"></select>
  </div>

  <div id="read-along"></div>
</div>

<script src="/static/reader-app.js"></script>
</body>
</html>
