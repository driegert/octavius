<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Octavius — Inbox</title>
<link rel="icon" type="image/png" href="/static/octavius-dapper_cyber_punk.png">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<link rel="manifest" href="/static/manifest.json">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="/static/app-common.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
    background: #0a0a0f;
    color: #c8c8d0;
    min-height: 100vh;
    padding: 2rem;
  }

  header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
  }

  header a {
    color: #555;
    text-decoration: none;
    font-size: 0.8rem;
    transition: color 0.2s;
  }
  header a:hover { color: #888; }

  header h1 {
    font-size: 1.1rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #6a6a7a;
    flex: 1;
  }

  /* Filters and search */
  .toolbar {
    display: flex;
    gap: 0.6rem;
    margin-bottom: 1.5rem;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
    flex-wrap: wrap;
  }

  .toolbar input[type="search"] {
    flex: 1;
    min-width: 200px;
    background: #151520;
    border: 1px solid #2a2a35;
    border-radius: 6px;
    color: #c8c8d0;
    font-family: inherit;
    font-size: 0.85rem;
    padding: 0.55rem 0.8rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .toolbar input[type="search"]:focus { border-color: #60a0ff; }
  .toolbar input[type="search"]::placeholder { color: #444; }

  .toolbar select {
    background: #151520;
    border: 1px solid #2a2a35;
    border-radius: 6px;
    color: #c8c8d0;
    font-family: inherit;
    font-size: 0.85rem;
    padding: 0.55rem 0.6rem;
    cursor: pointer;
  }
  .toolbar select:focus { outline: 1px solid #60a0ff; border-color: #60a0ff; }

  /* Item list */
  .items {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }

  .empty-state {
    text-align: center;
    color: #555;
    font-size: 0.9rem;
    padding: 3rem 0;
  }

  /* Card */
  .card {
    background: #151520;
    border: 1px solid #2a2a35;
    border-radius: 8px;
    padding: 1rem 1.2rem;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: #3a3a45; }
  .card.expanded { cursor: default; }

  .card-header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .badge {
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.15rem 0.45rem;
    border-radius: 3px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge.note { background: #1a2a1a; color: #6abf6a; }
  .badge.search_summary { background: #1a1a2a; color: #6a8abf; }
  .badge.article { background: #2a2a1a; color: #bfa06a; }
  .badge.email_draft { background: #2a1a2a; color: #bf6abf; }

  .card-title {
    flex: 1;
    font-size: 0.95rem;
    color: #d0d0e0;
  }

  .card-date {
    font-size: 0.7rem;
    color: #555;
    white-space: nowrap;
  }

  .card-preview {
    font-size: 0.85rem;
    color: #888;
    margin-top: 0.5rem;
    line-height: 1.45;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .card-full {
    display: none;
    margin-top: 0.8rem;
    font-size: 0.85rem;
    color: #aaa;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    border-top: 1px solid #2a2a35;
    padding-top: 0.8rem;
  }
  .card.expanded .card-preview { display: none; }
  .card.expanded .card-full { display: block; }

  .card-meta {
    display: none;
    margin-top: 0.6rem;
    font-size: 0.75rem;
    color: #666;
  }
  .card.expanded .card-meta { display: block; }
  .card-meta a { color: #60a0ff; text-decoration: none; }
  .card-meta a:hover { text-decoration: underline; }

  .card-actions {
    display: none;
    margin-top: 0.8rem;
    gap: 0.5rem;
  }
  .card.expanded .card-actions { display: flex; }

  .card-actions button {
    background: none;
    border: 1px solid #2a2a35;
    color: #888;
    padding: 0.35rem 0.8rem;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    font-family: inherit;
  }
  .card-actions button:hover { border-color: #555; color: #ccc; }
  .card-actions button.done-btn:hover { border-color: #4a8a4a; color: #6abf6a; }
  .card-actions button.dismiss-btn:hover { border-color: #8a4a4a; color: #bf6a6a; }
  .card-actions button.read-btn:hover { border-color: #4a6a8a; color: #6aabbf; }

  .status-badge {
    font-size: 0.6rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #555;
    padding: 0.1rem 0.35rem;
    border: 1px solid #333;
    border-radius: 3px;
    margin-left: auto;
  }
  .status-badge.done { color: #6abf6a; border-color: #3a5a3a; }
  .status-badge.dismissed { color: #888; border-color: #333; }

  /* Loading */
  .loading {
    text-align: center;
    color: #555;
    padding: 2rem 0;
  }

  /* Pagination */
  .pagination {
    display: flex;
    justify-content: center;
    gap: 0.8rem;
    margin-top: 1.5rem;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
  }

  .pagination button {
    background: none;
    border: 1px solid #2a2a35;
    color: #888;
    padding: 0.4rem 1rem;
    font-size: 0.75rem;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    font-family: inherit;
  }
  .pagination button:hover { border-color: #555; color: #ccc; }
  .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Chat panel */
  .card-chat {
    display: none;
    margin-top: 0.8rem;
    border-top: 1px solid #2a2a35;
    padding-top: 0.6rem;
  }
  .card.expanded .card-chat { display: block; }

  .chat-toggle-btn {
    background: none;
    border: 1px solid #2a2a35;
    color: #60a0ff;
    padding: 0.35rem 0.8rem;
    font-size: 0.75rem;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    font-family: inherit;
    width: 100%;
  }
  .chat-toggle-btn:hover { border-color: #60a0ff; color: #80c0ff; }

  .chat-panel { display: none; margin-top: 0.6rem; }
  .chat-panel.open { display: block; }

  .chat-messages {
    max-height: 40vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
    padding: 0.4rem;
  }

  .chat-msg {
    font-size: 0.8rem;
    line-height: 1.45;
    padding: 0.5rem 0.7rem;
    border-radius: 6px;
    max-width: 85%;
    word-break: break-word;
  }
  .chat-msg.user {
    background: #1a1a2a;
    color: #b0b0d0;
    align-self: flex-end;
  }
  .chat-msg.assistant {
    background: #1a2a1a;
    color: #c8c8d0;
    align-self: flex-start;
  }
  .chat-msg.assistant p { margin-bottom: 0.4em; }
  .chat-msg.assistant p:last-child { margin-bottom: 0; }
  .chat-msg.assistant ul, .chat-msg.assistant ol { margin: 0.3em 0 0.4em 1.1em; }
  .chat-msg.assistant li { margin-bottom: 0.15em; }
  .chat-msg.assistant strong { color: #e0e0f0; }
  .chat-msg.assistant code { background: #151520; padding: 0.1em 0.3em; border-radius: 3px; font-size: 0.85em; }

  .chat-status {
    font-size: 0.7rem;
    color: #60a0ff;
    padding: 0.2rem 0;
    min-height: 1.2em;
  }

  .chat-input-row {
    display: flex;
    gap: 0.4rem;
  }

  .chat-input-row input {
    flex: 1;
    background: #151520;
    border: 1px solid #2a2a35;
    border-radius: 6px;
    color: #c8c8d0;
    font-family: inherit;
    font-size: 0.8rem;
    padding: 0.5rem 0.7rem;
    outline: none;
  }
  .chat-input-row input:focus { border-color: #60a0ff; }
  .chat-input-row input::placeholder { color: #444; }

  .chat-input-row button {
    background: #151520;
    border: 1px solid #2a2a35;
    border-radius: 6px;
    color: #888;
    padding: 0.5rem 0.7rem;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: inherit;
  }
  .chat-input-row button:hover { border-color: #555; color: #ccc; }

  .chat-reset-btn {
    background: none;
    border: none;
    color: #555;
    font-size: 0.65rem;
    cursor: pointer;
    padding: 0.3rem 0;
    margin-top: 0.3rem;
  }
  .chat-reset-btn:hover { color: #888; }
</style>
</head>
<body>

<header>
  <a href="/">&larr; Octavius</a>
  <h1>Inbox</h1>
</header>

<div class="toolbar">
  <input type="search" id="search" placeholder="Search saved items...">
  <select id="type-filter">
    <option value="">All types</option>
    <option value="note">Notes</option>
    <option value="search_summary">Search summaries</option>
    <option value="article">Articles</option>
    <option value="email_draft">Email drafts</option>
  </select>
  <select id="status-filter">
    <option value="pending">Pending</option>
    <option value="">All</option>
    <option value="done">Done</option>
    <option value="dismissed">Dismissed</option>
  </select>
</div>

<div class="items" id="items"></div>

<div class="pagination" id="pagination">
  <button id="prev-btn" disabled>&larr; Prev</button>
  <button id="next-btn" disabled>Next &rarr;</button>
</div>

<script src="/static/inbox-app.js"></script>
</body>
</html>
