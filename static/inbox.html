<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Octavius — Inbox</title>
<link rel="icon" type="image/png" href="/static/octavius-dapper_cyber_punk.png">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<link rel="manifest" href="/static/manifest.json">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
    background: #0a0a0f;
    color: #c8c8d0;
    min-height: 100vh;
    padding: 2rem;
  }

  header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
  }

  header a {
    color: #555;
    text-decoration: none;
    font-size: 0.8rem;
    transition: color 0.2s;
  }
  header a:hover { color: #888; }

  header h1 {
    font-size: 1.1rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #6a6a7a;
    flex: 1;
  }

  /* Filters and search */
  .toolbar {
    display: flex;
    gap: 0.6rem;
    margin-bottom: 1.5rem;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
    flex-wrap: wrap;
  }

  .toolbar input[type="search"] {
    flex: 1;
    min-width: 200px;
    background: #151520;
    border: 1px solid #2a2a35;
    border-radius: 6px;
    color: #c8c8d0;
    font-family: inherit;
    font-size: 0.85rem;
    padding: 0.55rem 0.8rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .toolbar input[type="search"]:focus { border-color: #60a0ff; }
  .toolbar input[type="search"]::placeholder { color: #444; }

  .toolbar select {
    background: #151520;
    border: 1px solid #2a2a35;
    border-radius: 6px;
    color: #c8c8d0;
    font-family: inherit;
    font-size: 0.85rem;
    padding: 0.55rem 0.6rem;
    cursor: pointer;
  }
  .toolbar select:focus { outline: 1px solid #60a0ff; border-color: #60a0ff; }

  /* Item list */
  .items {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }

  .empty-state {
    text-align: center;
    color: #555;
    font-size: 0.9rem;
    padding: 3rem 0;
  }

  /* Card */
  .card {
    background: #151520;
    border: 1px solid #2a2a35;
    border-radius: 8px;
    padding: 1rem 1.2rem;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: #3a3a45; }
  .card.expanded { cursor: default; }

  .card-header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .badge {
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.15rem 0.45rem;
    border-radius: 3px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge.note { background: #1a2a1a; color: #6abf6a; }
  .badge.search_summary { background: #1a1a2a; color: #6a8abf; }
  .badge.article { background: #2a2a1a; color: #bfa06a; }
  .badge.email_draft { background: #2a1a2a; color: #bf6abf; }

  .card-title {
    flex: 1;
    font-size: 0.95rem;
    color: #d0d0e0;
  }

  .card-date {
    font-size: 0.7rem;
    color: #555;
    white-space: nowrap;
  }

  .card-preview {
    font-size: 0.85rem;
    color: #888;
    margin-top: 0.5rem;
    line-height: 1.45;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .card-full {
    display: none;
    margin-top: 0.8rem;
    font-size: 0.85rem;
    color: #aaa;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    border-top: 1px solid #2a2a35;
    padding-top: 0.8rem;
  }
  .card.expanded .card-preview { display: none; }
  .card.expanded .card-full { display: block; }

  .card-meta {
    display: none;
    margin-top: 0.6rem;
    font-size: 0.75rem;
    color: #666;
  }
  .card.expanded .card-meta { display: block; }
  .card-meta a { color: #60a0ff; text-decoration: none; }
  .card-meta a:hover { text-decoration: underline; }

  .card-actions {
    display: none;
    margin-top: 0.8rem;
    gap: 0.5rem;
  }
  .card.expanded .card-actions { display: flex; }

  .card-actions button {
    background: none;
    border: 1px solid #2a2a35;
    color: #888;
    padding: 0.35rem 0.8rem;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    font-family: inherit;
  }
  .card-actions button:hover { border-color: #555; color: #ccc; }
  .card-actions button.done-btn:hover { border-color: #4a8a4a; color: #6abf6a; }
  .card-actions button.dismiss-btn:hover { border-color: #8a4a4a; color: #bf6a6a; }
  .card-actions button.read-btn:hover { border-color: #4a6a8a; color: #6aabbf; }

  .status-badge {
    font-size: 0.6rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #555;
    padding: 0.1rem 0.35rem;
    border: 1px solid #333;
    border-radius: 3px;
    margin-left: auto;
  }
  .status-badge.done { color: #6abf6a; border-color: #3a5a3a; }
  .status-badge.dismissed { color: #888; border-color: #333; }

  /* Loading */
  .loading {
    text-align: center;
    color: #555;
    padding: 2rem 0;
  }

  /* Pagination */
  .pagination {
    display: flex;
    justify-content: center;
    gap: 0.8rem;
    margin-top: 1.5rem;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
  }

  .pagination button {
    background: none;
    border: 1px solid #2a2a35;
    color: #888;
    padding: 0.4rem 1rem;
    font-size: 0.75rem;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    font-family: inherit;
  }
  .pagination button:hover { border-color: #555; color: #ccc; }
  .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Chat panel */
  .card-chat {
    display: none;
    margin-top: 0.8rem;
    border-top: 1px solid #2a2a35;
    padding-top: 0.6rem;
  }
  .card.expanded .card-chat { display: block; }

  .chat-toggle-btn {
    background: none;
    border: 1px solid #2a2a35;
    color: #60a0ff;
    padding: 0.35rem 0.8rem;
    font-size: 0.75rem;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    font-family: inherit;
    width: 100%;
  }
  .chat-toggle-btn:hover { border-color: #60a0ff; color: #80c0ff; }

  .chat-panel { display: none; margin-top: 0.6rem; }
  .chat-panel.open { display: block; }

  .chat-messages {
    max-height: 40vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
    padding: 0.4rem;
  }

  .chat-msg {
    font-size: 0.8rem;
    line-height: 1.45;
    padding: 0.5rem 0.7rem;
    border-radius: 6px;
    max-width: 85%;
    word-break: break-word;
  }
  .chat-msg.user {
    background: #1a1a2a;
    color: #b0b0d0;
    align-self: flex-end;
  }
  .chat-msg.assistant {
    background: #1a2a1a;
    color: #c8c8d0;
    align-self: flex-start;
  }
  .chat-msg.assistant p { margin-bottom: 0.4em; }
  .chat-msg.assistant p:last-child { margin-bottom: 0; }
  .chat-msg.assistant ul, .chat-msg.assistant ol { margin: 0.3em 0 0.4em 1.1em; }
  .chat-msg.assistant li { margin-bottom: 0.15em; }
  .chat-msg.assistant strong { color: #e0e0f0; }
  .chat-msg.assistant code { background: #151520; padding: 0.1em 0.3em; border-radius: 3px; font-size: 0.85em; }

  .chat-status {
    font-size: 0.7rem;
    color: #60a0ff;
    padding: 0.2rem 0;
    min-height: 1.2em;
  }

  .chat-input-row {
    display: flex;
    gap: 0.4rem;
  }

  .chat-input-row input {
    flex: 1;
    background: #151520;
    border: 1px solid #2a2a35;
    border-radius: 6px;
    color: #c8c8d0;
    font-family: inherit;
    font-size: 0.8rem;
    padding: 0.5rem 0.7rem;
    outline: none;
  }
  .chat-input-row input:focus { border-color: #60a0ff; }
  .chat-input-row input::placeholder { color: #444; }

  .chat-input-row button {
    background: #151520;
    border: 1px solid #2a2a35;
    border-radius: 6px;
    color: #888;
    padding: 0.5rem 0.7rem;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: inherit;
  }
  .chat-input-row button:hover { border-color: #555; color: #ccc; }

  .chat-reset-btn {
    background: none;
    border: none;
    color: #555;
    font-size: 0.65rem;
    cursor: pointer;
    padding: 0.3rem 0;
    margin-top: 0.3rem;
  }
  .chat-reset-btn:hover { color: #888; }
</style>
</head>
<body>

<header>
  <a href="/">&larr; Octavius</a>
  <h1>Inbox</h1>
</header>

<div class="toolbar">
  <input type="search" id="search" placeholder="Search saved items...">
  <select id="type-filter">
    <option value="">All types</option>
    <option value="note">Notes</option>
    <option value="search_summary">Search summaries</option>
    <option value="article">Articles</option>
    <option value="email_draft">Email drafts</option>
  </select>
  <select id="status-filter">
    <option value="pending">Pending</option>
    <option value="">All</option>
    <option value="done">Done</option>
    <option value="dismissed">Dismissed</option>
  </select>
</div>

<div class="items" id="items"></div>

<div class="pagination" id="pagination">
  <button id="prev-btn" disabled>&larr; Prev</button>
  <button id="next-btn" disabled>Next &rarr;</button>
</div>

<script>
(function() {
  const itemsEl = document.getElementById('items');
  const searchInput = document.getElementById('search');
  const typeFilter = document.getElementById('type-filter');
  const statusFilter = document.getElementById('status-filter');
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');

  const PAGE_SIZE = 30;
  let offset = 0;
  let debounceTimer = null;

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const now = new Date();
    const diff = now - d;
    if (diff < 86400000) {
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    if (diff < 604800000) {
      return d.toLocaleDateString([], { weekday: 'short', hour: '2-digit', minute: '2-digit' });
    }
    return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function renderItems(items) {
    if (items.length === 0) {
      itemsEl.innerHTML = '<div class="empty-state">No items found.</div>';
      return;
    }

    itemsEl.innerHTML = '';
    for (const item of items) {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = item.id;

      let statusHtml = '';
      if (item.status !== 'pending') {
        statusHtml = `<span class="status-badge ${item.status}">${item.status}</span>`;
      }

      card.innerHTML = `
        <div class="card-header">
          <span class="badge ${item.item_type}">${item.item_type.replace('_', ' ')}</span>
          <span class="card-title">${esc(item.title)}</span>
          <span class="card-date">${formatDate(item.created_at)}</span>
          ${statusHtml}
        </div>
        <div class="card-preview">${esc(item.content)}</div>
        <div class="card-full"></div>
        <div class="card-meta"></div>
        <div class="card-actions">
          ${item.status === 'pending' ? `
            <button class="done-btn" onclick="event.stopPropagation(); updateStatus(${item.id}, 'done', this)">Mark done</button>
            <button class="dismiss-btn" onclick="event.stopPropagation(); updateStatus(${item.id}, 'dismissed', this)">Dismiss</button>
          ` : `
            <button onclick="event.stopPropagation(); updateStatus(${item.id}, 'pending', this)">Restore to pending</button>
          `}
          ${item.item_type === 'article' ? `
            <button class="read-btn" onclick="event.stopPropagation(); window.location.href='/reader?inbox_id=${item.id}'">Read aloud</button>
          ` : ''}
        </div>
        <div class="card-chat">
          <button class="chat-toggle-btn" onclick="event.stopPropagation(); toggleChat(${item.id}, this)">Chat with Octavius</button>
          <div class="chat-panel" id="chat-panel-${item.id}" onclick="event.stopPropagation()">
            <div class="chat-messages" id="chat-msgs-${item.id}"></div>
            <div class="chat-status" id="chat-status-${item.id}"></div>
            <div class="chat-input-row">
              <input type="text" id="chat-input-${item.id}" placeholder="Ask about this item..." onclick="event.stopPropagation()" onkeydown="if(event.key==='Enter'){event.stopPropagation();sendItemChat(${item.id})}">
              <button onclick="event.stopPropagation(); sendItemChat(${item.id})">Send</button>
            </div>
            <button class="chat-reset-btn" onclick="event.stopPropagation(); resetItemChat(${item.id})">Reset chat</button>
          </div>
        </div>
      `;

      card.addEventListener('click', () => toggleExpand(card, item.id));
      itemsEl.appendChild(card);
    }
  }

  function esc(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  async function toggleExpand(card, itemId) {
    if (card.classList.contains('expanded')) {
      card.classList.remove('expanded');
      return;
    }

    // Collapse others
    document.querySelectorAll('.card.expanded').forEach(c => c.classList.remove('expanded'));

    // Fetch full content
    const fullEl = card.querySelector('.card-full');
    const metaEl = card.querySelector('.card-meta');
    if (!fullEl.dataset.loaded) {
      fullEl.textContent = 'Loading...';
      card.classList.add('expanded');
      try {
        const resp = await fetch(`/api/inbox/${itemId}`);
        const data = await resp.json();
        const item = data.item;
        fullEl.textContent = item.content;
        fullEl.dataset.loaded = '1';

        let metaParts = [];
        if (item.source_url) {
          metaParts.push(`Source: <a href="${esc(item.source_url)}" target="_blank">${esc(item.source_url)}</a>`);
        }
        if (item.metadata) {
          if (item.metadata.to) metaParts.push(`To: ${esc(item.metadata.to)}`);
          if (item.metadata.subject) metaParts.push(`Subject: ${esc(item.metadata.subject)}`);
        }
        if (item.conversation_id) {
          metaParts.push(`Conversation #${item.conversation_id}`);
        }
        metaEl.innerHTML = metaParts.join(' &middot; ');
      } catch {
        fullEl.textContent = 'Failed to load.';
      }
    } else {
      card.classList.add('expanded');
    }
  }

  window.updateStatus = async function(itemId, status, btn) {
    try {
      const resp = await fetch(`/api/inbox/${itemId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status }),
      });
      if (resp.ok) {
        loadItems();
      }
    } catch (e) {
      console.error('Update failed:', e);
    }
  };

  async function loadItems() {
    const q = searchInput.value.trim();
    const type = typeFilter.value;
    const status = statusFilter.value;

    const params = new URLSearchParams();
    if (q) params.set('q', q);
    if (type) params.set('type', type);
    if (status) params.set('status', status);
    params.set('limit', PAGE_SIZE);
    params.set('offset', offset);

    itemsEl.innerHTML = '<div class="loading">Loading...</div>';

    try {
      const resp = await fetch(`/api/inbox?${params}`);
      const data = await resp.json();
      renderItems(data.items);
      prevBtn.disabled = offset === 0;
      nextBtn.disabled = data.items.length < PAGE_SIZE;
    } catch {
      itemsEl.innerHTML = '<div class="empty-state">Failed to load items.</div>';
    }
  }

  searchInput.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => { offset = 0; loadItems(); }, 300);
  });

  typeFilter.addEventListener('change', () => { offset = 0; loadItems(); });
  statusFilter.addEventListener('change', () => { offset = 0; loadItems(); });

  prevBtn.addEventListener('click', () => {
    offset = Math.max(0, offset - PAGE_SIZE);
    loadItems();
  });

  nextBtn.addEventListener('click', () => {
    offset += PAGE_SIZE;
    loadItems();
  });

  loadItems();

  // --- Markdown rendering
  if (typeof marked !== 'undefined') {
    marked.setOptions({ breaks: true, gfm: true });
  }
  function renderMd(text) {
    if (typeof marked !== 'undefined' && text) return marked.parse(text);
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML.replace(/\n/g, '<br>');
  }

  // --- WebSocket for item chat
  let ws = null;
  const chatLoaded = {}; // item_id -> true if chat panel has been initialized

  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws`);

    ws.onmessage = (evt) => {
      if (typeof evt.data !== 'string') return;
      const msg = JSON.parse(evt.data);

      if (msg.type === 'item_chat_loaded') {
        const msgsEl = document.getElementById('chat-msgs-' + msg.item_id);
        const statusEl = document.getElementById('chat-status-' + msg.item_id);
        if (!msgsEl) return;
        msgsEl.innerHTML = '';
        for (const m of (msg.messages || [])) {
          appendChatMsg(msg.item_id, m.role, m.content);
        }
        if (statusEl) statusEl.textContent = '';
      }

      if (msg.type === 'item_chat_status') {
        const statusEl = document.getElementById('chat-status-' + msg.item_id);
        if (statusEl) statusEl.textContent = msg.text;
      }

      if (msg.type === 'item_chat_response') {
        const statusEl = document.getElementById('chat-status-' + msg.item_id);
        if (statusEl) statusEl.textContent = '';
        appendChatMsg(msg.item_id, 'assistant', msg.text);
        // Re-enable input
        const input = document.getElementById('chat-input-' + msg.item_id);
        if (input) { input.disabled = false; input.focus(); }
      }
    };

    ws.onclose = () => setTimeout(connectWS, 2000);
    ws.onerror = () => ws.close();
  }

  function appendChatMsg(itemId, role, content) {
    const msgsEl = document.getElementById('chat-msgs-' + itemId);
    if (!msgsEl) return;
    const div = document.createElement('div');
    div.className = 'chat-msg ' + role;
    if (role === 'assistant') {
      div.innerHTML = renderMd(content);
    } else {
      div.textContent = content;
    }
    msgsEl.appendChild(div);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  window.toggleChat = function(itemId, btn) {
    const panel = document.getElementById('chat-panel-' + itemId);
    if (!panel) return;
    const isOpen = panel.classList.toggle('open');
    btn.textContent = isOpen ? 'Hide chat' : 'Chat with Octavius';

    // Load chat history on first open
    if (isOpen && !chatLoaded[itemId]) {
      chatLoaded[itemId] = true;
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'item_chat_load', item_id: itemId }));
      }
    }
  };

  window.sendItemChat = function(itemId) {
    const input = document.getElementById('chat-input-' + itemId);
    if (!input) return;
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

    appendChatMsg(itemId, 'user', text);
    input.value = '';
    input.disabled = true;

    ws.send(JSON.stringify({ type: 'item_chat', item_id: itemId, text: text }));
  };

  window.resetItemChat = function(itemId) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'item_chat_reset', item_id: itemId }));
    chatLoaded[itemId] = true; // Will receive item_chat_loaded with empty messages
  };

  connectWS();
})();
</script>
</body>
</html>
