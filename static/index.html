<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Octavius</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
    background: #0a0a0f;
    color: #c8c8d0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #6a6a7a;
    margin-bottom: 2rem;
  }

  #status {
    font-size: 0.9rem;
    color: #8888a0;
    margin-bottom: 1.5rem;
    min-height: 1.2em;
    transition: color 0.2s;
  }

  #status.active { color: #60a0ff; }

  #talk-btn {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 2px solid #333;
    background: #151520;
    color: #8888a0;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    -webkit-user-select: none;
    box-shadow: 0 0 20px rgba(96, 160, 255, 0.08), 0 0 40px rgba(96, 160, 255, 0.04);
  }

  #talk-btn:hover {
    border-color: #555;
    color: #aaa;
    box-shadow: 0 0 25px rgba(96, 160, 255, 0.14), 0 0 50px rgba(96, 160, 255, 0.06);
  }
  #talk-btn.recording {
    border-color: #ff4444;
    background: #201015;
    color: #ff6666;
    box-shadow: 0 0 30px rgba(255, 68, 68, 0.2), 0 0 60px rgba(255, 68, 68, 0.08);
  }
  #talk-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    box-shadow: none;
  }

  #transcript-area {
    margin-top: 2rem;
    width: 100%;
    max-width: 600px;
    text-align: center;
  }

  .label {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 0.3rem;
  }

  #user-text, #assistant-text {
    font-size: 0.95rem;
    line-height: 1.5;
    margin-bottom: 1.2rem;
    min-height: 1.4em;
    color: #aaa;
  }

  #assistant-text { color: #d0d0e0; }

  /* Settings gear */
  #settings-btn {
    position: fixed;
    top: 1.2rem;
    right: 1.2rem;
    background: none;
    border: none;
    color: #444;
    font-size: 1.3rem;
    cursor: pointer;
    transition: color 0.2s;
    padding: 0.3rem;
    line-height: 1;
  }
  #settings-btn:hover { color: #777; }

  /* Settings panel */
  #settings-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 100;
  }
  #settings-overlay.open { display: flex; align-items: center; justify-content: center; }

  #settings-panel {
    background: #12121a;
    border: 1px solid #2a2a35;
    border-radius: 8px;
    padding: 1.8rem 2rem;
    width: 320px;
    max-width: 90vw;
  }

  #settings-panel h2 {
    font-size: 0.8rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #6a6a7a;
    margin-bottom: 1.4rem;
  }

  .setting-group {
    margin-bottom: 1.2rem;
  }

  .setting-group label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 0.4rem;
  }

  .setting-group select {
    width: 100%;
    background: #1a1a25;
    border: 1px solid #2a2a35;
    color: #c8c8d0;
    padding: 0.45rem 0.5rem;
    font-size: 0.85rem;
    font-family: inherit;
    border-radius: 4px;
    cursor: pointer;
  }
  .setting-group select:focus { outline: 1px solid #60a0ff; border-color: #60a0ff; }

  .setting-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .setting-row input[type="range"] {
    flex: 1;
    accent-color: #60a0ff;
    cursor: pointer;
  }

  .setting-row span {
    font-size: 0.8rem;
    color: #8888a0;
    min-width: 2.8em;
    text-align: right;
  }

  .setting-row input[type="checkbox"] {
    accent-color: #60a0ff;
    cursor: pointer;
  }

  .setting-row .cb-label {
    font-size: 0.85rem;
    color: #8888a0;
    cursor: pointer;
    text-transform: none;
    letter-spacing: 0;
  }

  #settings-close {
    margin-top: 0.8rem;
    width: 100%;
    background: none;
    border: 1px solid #2a2a35;
    color: #666;
    padding: 0.45rem;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  #settings-close:hover { border-color: #555; color: #999; }

  /* Bottom controls */
  #bottom-controls {
    margin-top: 1.5rem;
  }

  #reset-btn {
    background: none;
    border: 1px solid #2a2a35;
    color: #555;
    padding: 0.4rem 1rem;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }

  #reset-btn:hover { border-color: #555; color: #888; }
</style>
</head>
<body>

<button id="settings-btn" title="Settings">&#9881;</button>

<div id="settings-overlay">
  <div id="settings-panel">
    <h2>Settings</h2>

    <div class="setting-group">
      <label for="voice-select">Voice</label>
      <select id="voice-select"></select>
    </div>

    <div class="setting-group">
      <label>Speed</label>
      <div class="setting-row">
        <input type="range" id="speed-slider" min="1.0" max="2.0" step="0.1" value="1.4">
        <span id="speed-value">1.4x</span>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-row">
        <input type="checkbox" id="trim-cb" checked>
        <span class="cb-label" onclick="document.getElementById('trim-cb').click()">Trim silence</span>
      </div>
    </div>

    <button id="settings-close">Done</button>
  </div>
</div>

<h1>Octavius</h1>
<div id="status">Connecting...</div>
<button id="talk-btn" disabled>HOLD TO<br>TALK</button>

<div id="transcript-area">
  <div class="label">You said</div>
  <div id="user-text"></div>
  <div class="label">Octavius</div>
  <div id="assistant-text"></div>
</div>

<div id="bottom-controls">
  <button id="reset-btn">Reset conversation</button>
</div>

<script>
(function() {
  const statusEl     = document.getElementById('status');
  const talkBtn      = document.getElementById('talk-btn');
  const userText     = document.getElementById('user-text');
  const assistText   = document.getElementById('assistant-text');
  const resetBtn     = document.getElementById('reset-btn');
  const settingsBtn  = document.getElementById('settings-btn');
  const settingsOver = document.getElementById('settings-overlay');
  const settingsClose= document.getElementById('settings-close');
  const voiceSelect  = document.getElementById('voice-select');
  const speedSlider  = document.getElementById('speed-slider');
  const speedValue   = document.getElementById('speed-value');
  const trimCb       = document.getElementById('trim-cb');

  let ws = null;
  let mediaRecorder = null;
  let audioChunks = [];
  let reconnectDelay = 1000;
  let audioCtx = null;
  let currentVoice = 'de_male';

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new AudioContext();
    return audioCtx;
  }

  // --- Per-voice settings stored as: octavius-prefs = { voice, voices: { "de_male": { speed, trim }, ... } }
  function loadPrefs() {
    try { return JSON.parse(localStorage.getItem('octavius-prefs')) || {}; } catch { return {}; }
  }

  function savePrefs(prefs) {
    localStorage.setItem('octavius-prefs', JSON.stringify(prefs));
  }

  function getVoicePrefs(voice) {
    const prefs = loadPrefs();
    const vp = (prefs.voices || {})[voice];
    return vp || { speed: 1.4, trim: true };
  }

  function saveVoicePrefs(voice, speed, trim) {
    const prefs = loadPrefs();
    if (!prefs.voices) prefs.voices = {};
    prefs.voices[voice] = { speed, trim };
    prefs.voice = voice;
    savePrefs(prefs);
  }

  function applyVoicePrefs(voice) {
    const vp = getVoicePrefs(voice);
    speedSlider.value = vp.speed;
    speedValue.textContent = parseFloat(vp.speed).toFixed(1) + 'x';
    trimCb.checked = vp.trim;
  }

  function persistCurrent() {
    saveVoicePrefs(currentVoice, parseFloat(speedSlider.value), trimCb.checked);
  }

  // Restore last-used voice
  const prefs = loadPrefs();
  if (prefs.voice) currentVoice = prefs.voice;
  applyVoicePrefs(currentVoice);

  // --- Settings panel
  settingsBtn.addEventListener('click', () => settingsOver.classList.add('open'));
  settingsClose.addEventListener('click', () => settingsOver.classList.remove('open'));
  settingsOver.addEventListener('click', (e) => {
    if (e.target === settingsOver) settingsOver.classList.remove('open');
  });

  // Fetch voices from server and populate dropdown
  fetch('/api/voices').then(r => r.json()).then(data => {
    voiceSelect.innerHTML = '';
    for (const v of data.voices) {
      const opt = document.createElement('option');
      opt.value = v;
      opt.textContent = v.replace(/_/g, ' ');
      voiceSelect.appendChild(opt);
    }
    // Restore saved voice or use server default
    if (data.voices.includes(currentVoice)) {
      voiceSelect.value = currentVoice;
    } else {
      voiceSelect.value = data.default;
      currentVoice = data.default;
    }
    applyVoicePrefs(currentVoice);
  }).catch(() => {
    const opt = document.createElement('option');
    opt.value = 'de_male';
    opt.textContent = 'de male';
    voiceSelect.appendChild(opt);
  });

  voiceSelect.addEventListener('change', () => {
    currentVoice = voiceSelect.value;
    applyVoicePrefs(currentVoice);
    sendSettings();
    persistCurrent();
  });

  speedSlider.addEventListener('input', () => {
    speedValue.textContent = parseFloat(speedSlider.value).toFixed(1) + 'x';
    persistCurrent();
  });

  trimCb.addEventListener('change', () => {
    persistCurrent();
  });

  function sendSettings() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'settings', voice: currentVoice }));
    }
  }

  function setStatus(text, active) {
    statusEl.textContent = text;
    statusEl.classList.toggle('active', !!active);
  }

  // Trim silence from an AudioBuffer.
  // Shortens long silent gaps while keeping enough for natural sentence pacing.
  function trimSilence(audioBuffer) {
    const sampleRate = audioBuffer.sampleRate;
    const numChannels = audioBuffer.numberOfChannels;
    const data = audioBuffer.getChannelData(0);
    const len = data.length;

    const silenceThreshold = 0.008;
    const windowSize = Math.floor(sampleRate * 0.025);    // 25ms RMS window
    const minSilenceDuration = Math.floor(sampleRate * 0.4);  // only trim silences > 400ms
    const keepSilence = Math.floor(sampleRate * 0.25);        // keep 250ms of each gap

    function rms(start, end) {
      let sum = 0;
      const n = Math.min(end, len) - start;
      if (n <= 0) return 0;
      for (let i = start; i < start + n; i++) {
        sum += data[i] * data[i];
      }
      return Math.sqrt(sum / n);
    }

    const silentRegions = [];
    let inSilence = false;
    let silenceStart = 0;

    for (let i = 0; i < len; i += windowSize) {
      const energy = rms(i, i + windowSize);
      if (energy < silenceThreshold) {
        if (!inSilence) {
          inSilence = true;
          silenceStart = i;
        }
      } else {
        if (inSilence) {
          if (i - silenceStart > minSilenceDuration) {
            silentRegions.push({ start: silenceStart, end: i });
          }
          inSilence = false;
        }
      }
    }
    if (inSilence && (len - silenceStart) > minSilenceDuration) {
      silentRegions.push({ start: silenceStart, end: len });
    }

    if (silentRegions.length === 0) return audioBuffer;

    const segments = [];
    let pos = 0;
    for (const region of silentRegions) {
      if (region.start > pos) {
        segments.push({ start: pos, end: region.start });
      }
      segments.push({ start: region.start, end: Math.min(region.start + keepSilence, region.end) });
      pos = region.end;
    }
    if (pos < len) {
      segments.push({ start: pos, end: len });
    }

    let newLen = 0;
    for (const seg of segments) newLen += (seg.end - seg.start);

    if (newLen >= len * 0.95) return audioBuffer;

    const ctx = getAudioCtx();
    const newBuffer = ctx.createBuffer(numChannels, newLen, sampleRate);

    for (let ch = 0; ch < numChannels; ch++) {
      const src = audioBuffer.getChannelData(ch);
      const dst = newBuffer.getChannelData(ch);
      let writePos = 0;
      for (const seg of segments) {
        const chunk = src.subarray(seg.start, seg.end);
        dst.set(chunk, writePos);
        writePos += chunk.length;
      }
    }

    return newBuffer;
  }

  async function playProcessedAudio(arrayBuffer) {
    const speed = parseFloat(speedSlider.value);

    if (trimCb.checked) {
      const ctx = getAudioCtx();
      if (ctx.state === 'suspended') await ctx.resume();
      const buffer = trimSilence(await ctx.decodeAudioData(arrayBuffer));
      arrayBuffer = audioBufferToWav(buffer);
    }

    const blob = new Blob([arrayBuffer], { type: 'audio/wav' });
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.preservesPitch = true;
    audio.playbackRate = speed;

    audio.onended = () => {
      URL.revokeObjectURL(url);
      setStatus('Ready');
      talkBtn.disabled = false;
    };
    audio.onerror = () => {
      URL.revokeObjectURL(url);
      setStatus('Ready');
      talkBtn.disabled = false;
    };

    audio.play().catch(() => {
      setStatus('Ready');
      talkBtn.disabled = false;
    });
  }

  function audioBufferToWav(buffer) {
    const numChannels = buffer.numberOfChannels;
    const sampleRate = buffer.sampleRate;
    const length = buffer.length;
    const bytesPerSample = 2;
    const dataSize = length * numChannels * bytesPerSample;
    const headerSize = 44;
    const out = new ArrayBuffer(headerSize + dataSize);
    const view = new DataView(out);

    function writeStr(offset, str) {
      for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
    }

    writeStr(0, 'RIFF');
    view.setUint32(4, 36 + dataSize, true);
    writeStr(8, 'WAVE');
    writeStr(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, numChannels, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * numChannels * bytesPerSample, true);
    view.setUint16(32, numChannels * bytesPerSample, true);
    view.setUint16(34, 16, true);
    writeStr(36, 'data');
    view.setUint32(40, dataSize, true);

    let offset = 44;
    const channels = [];
    for (let ch = 0; ch < numChannels; ch++) channels.push(buffer.getChannelData(ch));

    for (let i = 0; i < length; i++) {
      for (let ch = 0; ch < numChannels; ch++) {
        const s = Math.max(-1, Math.min(1, channels[ch][i]));
        view.setInt16(offset, s * 0x7FFF, true);
        offset += 2;
      }
    }

    return out;
  }

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws`);

    ws.onopen = () => {
      setStatus('Ready');
      talkBtn.disabled = false;
      reconnectDelay = 1000;
      sendSettings();
    };

    ws.onmessage = (evt) => {
      if (typeof evt.data === 'string') {
        const msg = JSON.parse(evt.data);
        if (msg.type === 'status')     setStatus(msg.text, true);
        if (msg.type === 'transcript') userText.textContent = msg.text;
        if (msg.type === 'response') {
          assistText.textContent = msg.text;
          setStatus('Speaking...', true);
        }
      }
    };

    ws.binaryType = 'arraybuffer';
    ws.addEventListener('message', (evt) => {
      if (evt.data instanceof ArrayBuffer) {
        playProcessedAudio(evt.data).catch(() => {
          setStatus('Ready');
          talkBtn.disabled = false;
        });
      }
    });

    ws.onclose = () => {
      talkBtn.disabled = true;
      setStatus('Disconnected. Reconnecting...');
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, 15000);
    };

    ws.onerror = () => ws.close();
  }

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
      mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(blob);
          talkBtn.disabled = true;
          setStatus('Sending audio...', true);
        }
      };
      mediaRecorder.start();
      talkBtn.classList.add('recording');
      setStatus('Recording...', true);
    } catch (err) {
      setStatus('Microphone access denied.');
    }
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
      talkBtn.classList.remove('recording');
    }
  }

  talkBtn.addEventListener('mousedown', (e) => { e.preventDefault(); startRecording(); });
  talkBtn.addEventListener('mouseup', stopRecording);
  talkBtn.addEventListener('mouseleave', stopRecording);
  talkBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
  talkBtn.addEventListener('touchend', stopRecording);
  talkBtn.addEventListener('touchcancel', stopRecording);

  resetBtn.addEventListener('click', () => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'reset' }));
      userText.textContent = '';
      assistText.textContent = '';
    }
  });

  connect();
})();
</script>
</body>
</html>
