<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Octavius</title>
<link rel="icon" type="image/png" href="/static/Octavius-favicon1.png">
<link rel="apple-touch-icon" href="/static/Octavius-bookmark.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
    background: #0a0a0f;
    color: #c8c8d0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #6a6a7a;
    margin-bottom: 0.6rem;
  }

  /* Mode toggles below title */
  #mode-toggles {
    display: flex;
    gap: 1.2rem;
    margin-bottom: 1.8rem;
  }

  .mode-toggle {
    position: relative;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.3rem;
    transition: all 0.2s;
  }

  .mode-toggle svg {
    width: 20px;
    height: 20px;
    fill: none;
    stroke: #60a0ff;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.2s, opacity 0.2s;
    opacity: 0.7;
  }

  .mode-toggle:hover svg { opacity: 1; }

  .mode-toggle.off svg { stroke: #444; opacity: 0.4; }

  .mode-toggle .strike {
    position: absolute;
    top: 50%; left: 50%;
    width: 28px;
    height: 0;
    border-top: 1.5px solid #ff5555;
    transform: translate(-50%, -50%) rotate(-45deg);
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }

  .mode-toggle.off .strike { opacity: 0.8; }

  .mode-label {
    font-size: 0.55rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #555;
    text-align: center;
    margin-top: 0.15rem;
  }

  .mode-toggle.off .mode-label { color: #333; }

  #status {
    font-size: 0.9rem;
    color: #8888a0;
    margin-bottom: 1.5rem;
    min-height: 1.2em;
    transition: color 0.2s;
  }

  #status.active { color: #60a0ff; }

  /* Talk button */
  #talk-btn {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 2px solid #333;
    background: #151520;
    color: #8888a0;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    -webkit-user-select: none;
    box-shadow: 0 0 20px rgba(96, 160, 255, 0.08), 0 0 40px rgba(96, 160, 255, 0.04);
  }

  #talk-btn:hover {
    border-color: #555;
    color: #aaa;
    box-shadow: 0 0 25px rgba(96, 160, 255, 0.14), 0 0 50px rgba(96, 160, 255, 0.06);
  }
  #talk-btn.recording {
    border-color: #ff4444;
    background: #201015;
    color: #ff6666;
    box-shadow: 0 0 30px rgba(255, 68, 68, 0.2), 0 0 60px rgba(255, 68, 68, 0.08);
  }
  #talk-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    box-shadow: none;
  }

  /* Text input (visible when STT off) */
  #text-input-area {
    display: none;
    width: 100%;
    max-width: 500px;
  }

  #text-input-area.visible { display: flex; gap: 0.5rem; }

  #text-input {
    flex: 1;
    background: #151520;
    border: 1px solid #2a2a35;
    border-radius: 6px;
    color: #c8c8d0;
    font-family: inherit;
    font-size: 0.9rem;
    padding: 0.7rem 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  #text-input:focus { border-color: #60a0ff; }

  #text-input::placeholder { color: #444; }

  #text-send {
    background: #151520;
    border: 1px solid #2a2a35;
    border-radius: 6px;
    color: #8888a0;
    padding: 0.7rem 1rem;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  #text-send:hover { border-color: #555; color: #ccc; }
  #text-send:disabled { opacity: 0.3; cursor: not-allowed; }

  #transcript-area {
    margin-top: 2rem;
    width: 100%;
    max-width: 600px;
    text-align: center;
  }

  .label {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 0.3rem;
  }

  #user-text, #assistant-text {
    font-size: 0.95rem;
    line-height: 1.5;
    margin-bottom: 1.2rem;
    min-height: 1.4em;
    color: #aaa;
  }

  #assistant-text { color: #d0d0e0; }

  /* Settings gear */
  #settings-btn {
    position: fixed;
    top: 1.2rem;
    right: 1.2rem;
    background: none;
    border: none;
    color: #444;
    font-size: 1.3rem;
    cursor: pointer;
    transition: color 0.2s;
    padding: 0.3rem;
    line-height: 1;
  }
  #settings-btn:hover { color: #777; }

  /* Settings panel */
  #settings-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 100;
  }
  #settings-overlay.open { display: flex; align-items: center; justify-content: center; }

  #settings-panel {
    background: #12121a;
    border: 1px solid #2a2a35;
    border-radius: 8px;
    padding: 1.8rem 2rem;
    width: 320px;
    max-width: 90vw;
  }

  #settings-panel h2 {
    font-size: 0.8rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #6a6a7a;
    margin-bottom: 1.4rem;
  }

  .setting-group {
    margin-bottom: 1.2rem;
  }

  .setting-group label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 0.4rem;
  }

  .setting-group select {
    width: 100%;
    background: #1a1a25;
    border: 1px solid #2a2a35;
    color: #c8c8d0;
    padding: 0.45rem 0.5rem;
    font-size: 0.85rem;
    font-family: inherit;
    border-radius: 4px;
    cursor: pointer;
  }
  .setting-group select:focus { outline: 1px solid #60a0ff; border-color: #60a0ff; }

  .setting-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .setting-row input[type="range"] {
    flex: 1;
    accent-color: #60a0ff;
    cursor: pointer;
  }

  .setting-row span {
    font-size: 0.8rem;
    color: #8888a0;
    min-width: 2.8em;
    text-align: right;
  }

  .setting-row input[type="checkbox"] {
    accent-color: #60a0ff;
    cursor: pointer;
  }

  .setting-row .cb-label {
    font-size: 0.85rem;
    color: #8888a0;
    cursor: pointer;
    text-transform: none;
    letter-spacing: 0;
  }

  #settings-close {
    margin-top: 0.8rem;
    width: 100%;
    background: none;
    border: 1px solid #2a2a35;
    color: #666;
    padding: 0.45rem;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  #settings-close:hover { border-color: #555; color: #999; }

  /* Bottom controls */
  #bottom-controls {
    margin-top: 1.5rem;
  }

  #reset-btn {
    background: none;
    border: 1px solid #2a2a35;
    color: #555;
    padding: 0.4rem 1rem;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }

  #reset-btn:hover { border-color: #555; color: #888; }

  #stop-btn {
    display: none;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1.5px solid #ff5555;
    background: #1a1015;
    color: #ff6666;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    z-index: 50;
    box-shadow: 0 0 15px rgba(255, 85, 85, 0.1);
  }
  #stop-btn:hover {
    background: #251520;
    box-shadow: 0 0 20px rgba(255, 85, 85, 0.2);
  }
  #stop-btn.visible { display: block; }
</style>
</head>
<body>

<button id="settings-btn" title="Settings">&#9881;</button>

<div id="settings-overlay">
  <div id="settings-panel">
    <h2>Settings</h2>

    <div class="setting-group">
      <label for="voice-select">Voice</label>
      <select id="voice-select"></select>
    </div>

    <div class="setting-group">
      <label>Speed</label>
      <div class="setting-row">
        <input type="range" id="speed-slider" min="1.0" max="2.0" step="0.1" value="1.4">
        <span id="speed-value">1.4x</span>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-row">
        <input type="checkbox" id="trim-cb" checked>
        <span class="cb-label" onclick="document.getElementById('trim-cb').click()">Trim silence</span>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-row">
        <input type="checkbox" id="toggle-talk-cb">
        <span class="cb-label" onclick="document.getElementById('toggle-talk-cb').click()">Toggle-to-talk</span>
      </div>
    </div>

    <button id="settings-close">Done</button>
  </div>
</div>

<h1>Octavius</h1>

<div id="mode-toggles">
  <button class="mode-toggle" id="stt-toggle" title="Speech input">
    <!-- Speech bubble icon -->
    <svg viewBox="0 0 24 24">
      <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
    </svg>
    <div class="strike"></div>
    <div class="mode-label">voice in</div>
  </button>
  <button class="mode-toggle" id="tts-toggle" title="Audio output">
    <!-- Speaker/audio icon -->
    <svg viewBox="0 0 24 24">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
    </svg>
    <div class="strike"></div>
    <div class="mode-label">voice out</div>
  </button>
</div>

<div id="status">Connecting...</div>
<button id="talk-btn" disabled>HOLD TO<br>TALK</button>

<div id="text-input-area">
  <input type="text" id="text-input" placeholder="Type your message..." autocomplete="off">
  <button id="text-send" disabled>Send</button>
</div>

<div id="transcript-area">
  <div class="label">You said</div>
  <div id="user-text"></div>
  <div class="label">Octavius</div>
  <div id="assistant-text"></div>
</div>

<div id="bottom-controls">
  <button id="reset-btn">Reset conversation</button>
</div>

<button id="stop-btn" title="Stop playback">&#9632;</button>

<script>
(function() {
  const statusEl      = document.getElementById('status');
  const talkBtn       = document.getElementById('talk-btn');
  const userText      = document.getElementById('user-text');
  const assistText    = document.getElementById('assistant-text');
  const resetBtn      = document.getElementById('reset-btn');
  const stopBtn       = document.getElementById('stop-btn');
  const settingsBtn   = document.getElementById('settings-btn');
  const settingsOver  = document.getElementById('settings-overlay');
  const settingsClose = document.getElementById('settings-close');
  const voiceSelect   = document.getElementById('voice-select');
  const speedSlider   = document.getElementById('speed-slider');
  const speedValue    = document.getElementById('speed-value');
  const trimCb        = document.getElementById('trim-cb');
  const sttToggle     = document.getElementById('stt-toggle');
  const ttsToggle     = document.getElementById('tts-toggle');
  const textInputArea = document.getElementById('text-input-area');
  const textInput     = document.getElementById('text-input');
  const textSend      = document.getElementById('text-send');
  const toggleTalkCb  = document.getElementById('toggle-talk-cb');

  let ws = null;
  let mediaRecorder = null;
  let audioChunks = [];
  let reconnectDelay = 1000;
  let audioCtx = null;
  let currentVoice = 'de_male';
  let sttEnabled = true;
  let ttsEnabled = true;
  let toggleToTalk = false;

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new AudioContext();
    return audioCtx;
  }

  // --- Mode toggles
  function updateInputMode() {
    if (sttEnabled) {
      talkBtn.style.display = '';
      textInputArea.classList.remove('visible');
      talkBtn.innerHTML = toggleToTalk ? 'TAP TO<br>TALK' : 'HOLD TO<br>TALK';
    } else {
      talkBtn.style.display = 'none';
      textInputArea.classList.add('visible');
      textInput.focus();
    }
    sttToggle.classList.toggle('off', !sttEnabled);
    ttsToggle.classList.toggle('off', !ttsEnabled);
    toggleTalkCb.checked = toggleToTalk;

    // Persist
    const prefs = loadPrefs();
    prefs.sttEnabled = sttEnabled;
    prefs.ttsEnabled = ttsEnabled;
    prefs.toggleToTalk = toggleToTalk;
    savePrefs(prefs);
  }

  sttToggle.addEventListener('click', () => {
    sttEnabled = !sttEnabled;
    updateInputMode();
  });

  ttsToggle.addEventListener('click', () => {
    ttsEnabled = !ttsEnabled;
    updateInputMode();
    sendSettings();
  });

  // --- Text input submission
  function submitText() {
    const text = textInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'text_input', text }));
    textInput.value = '';
    textSend.disabled = true;
    setStatus('Sending...', true);
  }

  textSend.addEventListener('click', submitText);
  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      submitText();
    }
  });
  textInput.addEventListener('input', () => {
    textSend.disabled = !textInput.value.trim();
  });

  // --- Per-voice settings
  function loadPrefs() {
    try { return JSON.parse(localStorage.getItem('octavius-prefs')) || {}; } catch { return {}; }
  }

  function savePrefs(prefs) {
    localStorage.setItem('octavius-prefs', JSON.stringify(prefs));
  }

  function getVoicePrefs(voice) {
    const prefs = loadPrefs();
    const vp = (prefs.voices || {})[voice];
    return vp || { speed: 1.4, trim: true };
  }

  function saveVoicePrefs(voice, speed, trim) {
    const prefs = loadPrefs();
    if (!prefs.voices) prefs.voices = {};
    prefs.voices[voice] = { speed, trim };
    prefs.voice = voice;
    savePrefs(prefs);
  }

  function applyVoicePrefs(voice) {
    const vp = getVoicePrefs(voice);
    speedSlider.value = vp.speed;
    speedValue.textContent = parseFloat(vp.speed).toFixed(1) + 'x';
    trimCb.checked = vp.trim;
  }

  function persistCurrent() {
    saveVoicePrefs(currentVoice, parseFloat(speedSlider.value), trimCb.checked);
  }

  // Restore saved state
  const prefs = loadPrefs();
  if (prefs.voice) currentVoice = prefs.voice;
  if (prefs.sttEnabled !== undefined) sttEnabled = prefs.sttEnabled;
  if (prefs.ttsEnabled !== undefined) ttsEnabled = prefs.ttsEnabled;
  if (prefs.toggleToTalk !== undefined) toggleToTalk = prefs.toggleToTalk;
  applyVoicePrefs(currentVoice);
  updateInputMode();

  // --- Settings panel
  settingsBtn.addEventListener('click', () => settingsOver.classList.add('open'));
  settingsClose.addEventListener('click', () => settingsOver.classList.remove('open'));
  settingsOver.addEventListener('click', (e) => {
    if (e.target === settingsOver) settingsOver.classList.remove('open');
  });

  fetch('/api/voices').then(r => r.json()).then(data => {
    voiceSelect.innerHTML = '';
    for (const v of data.voices) {
      const opt = document.createElement('option');
      opt.value = v;
      opt.textContent = v.replace(/_/g, ' ');
      voiceSelect.appendChild(opt);
    }
    if (data.voices.includes(currentVoice)) {
      voiceSelect.value = currentVoice;
    } else {
      voiceSelect.value = data.default;
      currentVoice = data.default;
    }
    applyVoicePrefs(currentVoice);
  }).catch(() => {
    const opt = document.createElement('option');
    opt.value = 'de_male';
    opt.textContent = 'de male';
    voiceSelect.appendChild(opt);
  });

  voiceSelect.addEventListener('change', () => {
    currentVoice = voiceSelect.value;
    applyVoicePrefs(currentVoice);
    sendSettings();
    persistCurrent();
  });

  speedSlider.addEventListener('input', () => {
    speedValue.textContent = parseFloat(speedSlider.value).toFixed(1) + 'x';
    persistCurrent();
  });

  trimCb.addEventListener('change', () => {
    persistCurrent();
  });

  toggleTalkCb.addEventListener('change', () => {
    toggleToTalk = toggleTalkCb.checked;
    updateInputMode();
  });

  function sendSettings() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'settings', voice: currentVoice, tts: ttsEnabled }));
    }
  }

  function setStatus(text, active) {
    statusEl.textContent = text;
    statusEl.classList.toggle('active', !!active);
  }

  // --- Silence trimming
  function trimSilence(audioBuffer) {
    const sampleRate = audioBuffer.sampleRate;
    const numChannels = audioBuffer.numberOfChannels;
    const data = audioBuffer.getChannelData(0);
    const len = data.length;

    const silenceThreshold = 0.008;
    const windowSize = Math.floor(sampleRate * 0.025);
    const minSilenceDuration = Math.floor(sampleRate * 0.4);
    const keepSilence = Math.floor(sampleRate * 0.25);

    function rms(start, end) {
      let sum = 0;
      const n = Math.min(end, len) - start;
      if (n <= 0) return 0;
      for (let i = start; i < start + n; i++) {
        sum += data[i] * data[i];
      }
      return Math.sqrt(sum / n);
    }

    const silentRegions = [];
    let inSilence = false;
    let silenceStart = 0;

    for (let i = 0; i < len; i += windowSize) {
      const energy = rms(i, i + windowSize);
      if (energy < silenceThreshold) {
        if (!inSilence) { inSilence = true; silenceStart = i; }
      } else {
        if (inSilence) {
          if (i - silenceStart > minSilenceDuration) {
            silentRegions.push({ start: silenceStart, end: i });
          }
          inSilence = false;
        }
      }
    }
    if (inSilence && (len - silenceStart) > minSilenceDuration) {
      silentRegions.push({ start: silenceStart, end: len });
    }

    if (silentRegions.length === 0) return audioBuffer;

    const segments = [];
    let pos = 0;
    for (const region of silentRegions) {
      if (region.start > pos) segments.push({ start: pos, end: region.start });
      segments.push({ start: region.start, end: Math.min(region.start + keepSilence, region.end) });
      pos = region.end;
    }
    if (pos < len) segments.push({ start: pos, end: len });

    let newLen = 0;
    for (const seg of segments) newLen += (seg.end - seg.start);
    if (newLen >= len * 0.95) return audioBuffer;

    const ctx = getAudioCtx();
    const newBuffer = ctx.createBuffer(numChannels, newLen, sampleRate);

    for (let ch = 0; ch < numChannels; ch++) {
      const src = audioBuffer.getChannelData(ch);
      const dst = newBuffer.getChannelData(ch);
      let writePos = 0;
      for (const seg of segments) {
        dst.set(src.subarray(seg.start, seg.end), writePos);
        writePos += (seg.end - seg.start);
      }
    }

    return newBuffer;
  }

  // --- Audio queue for streaming playback
  const audioQueue = [];
  let isPlaying = false;
  let audioDone = false;
  let currentAudio = null; // reference to currently playing Audio element

  function enqueueAudio(arrayBuffer) {
    audioQueue.push(arrayBuffer);
    stopBtn.classList.add('visible');
    if (!isPlaying) playNext();
  }

  function signalAudioDone() {
    audioDone = true;
    if (!isPlaying && audioQueue.length === 0) finishPlayback();
  }

  function stopPlayback() {
    audioQueue.length = 0;
    audioDone = false;
    if (currentAudio) {
      currentAudio.pause();
      currentAudio = null;
    }
    isPlaying = false;
    stopBtn.classList.remove('visible');
    setStatus('Ready');
    talkBtn.disabled = false;
    textSend.disabled = !textInput.value.trim();
  }

  function finishPlayback() {
    setStatus('Ready');
    talkBtn.disabled = false;
    textSend.disabled = !textInput.value.trim();
    audioDone = false;
    stopBtn.classList.remove('visible');
    currentAudio = null;
  }

  async function playNext() {
    if (audioQueue.length === 0) {
      isPlaying = false;
      if (audioDone) finishPlayback();
      return;
    }

    isPlaying = true;
    let arrayBuffer = audioQueue.shift();
    const speed = parseFloat(speedSlider.value);

    if (trimCb.checked) {
      try {
        const ctx = getAudioCtx();
        if (ctx.state === 'suspended') await ctx.resume();
        const buffer = trimSilence(await ctx.decodeAudioData(arrayBuffer));
        arrayBuffer = audioBufferToWav(buffer);
      } catch (e) { /* use original if decode fails */ }
    }

    const blob = new Blob([arrayBuffer], { type: 'audio/wav' });
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.preservesPitch = true;
    audio.playbackRate = speed;
    currentAudio = audio;

    audio.onended = () => {
      URL.revokeObjectURL(url);
      if (currentAudio === audio) currentAudio = null;
      playNext();
    };
    audio.onerror = () => {
      URL.revokeObjectURL(url);
      if (currentAudio === audio) currentAudio = null;
      playNext();
    };

    audio.play().catch(() => playNext());
  }

  stopBtn.addEventListener('click', stopPlayback);

  function audioBufferToWav(buffer) {
    const numChannels = buffer.numberOfChannels;
    const sampleRate = buffer.sampleRate;
    const length = buffer.length;
    const bytesPerSample = 2;
    const dataSize = length * numChannels * bytesPerSample;
    const headerSize = 44;
    const out = new ArrayBuffer(headerSize + dataSize);
    const view = new DataView(out);

    function writeStr(offset, str) {
      for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
    }

    writeStr(0, 'RIFF');
    view.setUint32(4, 36 + dataSize, true);
    writeStr(8, 'WAVE');
    writeStr(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, numChannels, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * numChannels * bytesPerSample, true);
    view.setUint16(32, numChannels * bytesPerSample, true);
    view.setUint16(34, 16, true);
    writeStr(36, 'data');
    view.setUint32(40, dataSize, true);

    let offset = 44;
    const channels = [];
    for (let ch = 0; ch < numChannels; ch++) channels.push(buffer.getChannelData(ch));

    for (let i = 0; i < length; i++) {
      for (let ch = 0; ch < numChannels; ch++) {
        const s = Math.max(-1, Math.min(1, channels[ch][i]));
        view.setInt16(offset, s * 0x7FFF, true);
        offset += 2;
      }
    }

    return out;
  }

  // --- WebSocket
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws`);

    ws.onopen = () => {
      setStatus('Ready');
      talkBtn.disabled = false;
      textSend.disabled = !textInput.value.trim();
      reconnectDelay = 1000;
      sendSettings();
    };

    ws.onmessage = (evt) => {
      if (typeof evt.data === 'string') {
        const msg = JSON.parse(evt.data);
        if (msg.type === 'status') {
          if (msg.text === 'audio_done') {
            // Server finished sending all audio chunks
            signalAudioDone();
          } else {
            setStatus(msg.text, true);
            if (msg.text === 'Ready') {
              talkBtn.disabled = false;
              textSend.disabled = !textInput.value.trim();
            }
          }
        }
        if (msg.type === 'transcript') userText.textContent = msg.text;
        if (msg.type === 'response') {
          assistText.textContent = msg.text;
          if (!ttsEnabled) {
            setStatus('Ready');
            talkBtn.disabled = false;
            textSend.disabled = !textInput.value.trim();
          }
        }
      }
    };

    ws.binaryType = 'arraybuffer';
    ws.addEventListener('message', (evt) => {
      if (evt.data instanceof ArrayBuffer) {
        setStatus('Speaking...', true);
        enqueueAudio(evt.data);
      }
    });

    ws.onclose = () => {
      talkBtn.disabled = true;
      textSend.disabled = true;
      setStatus('Disconnected. Reconnecting...');
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, 15000);
    };

    ws.onerror = () => ws.close();
  }

  // --- Recording
  async function startRecording() {
    if (!sttEnabled) return;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
      mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(blob);
          talkBtn.disabled = true;
          setStatus('Sending audio...', true);
        }
      };
      mediaRecorder.start();
      talkBtn.classList.add('recording');
      setStatus('Recording...', true);
    } catch (err) {
      setStatus('Microphone access denied.');
    }
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
      talkBtn.classList.remove('recording');
    }
  }

  // Push-to-talk: hold to record, release to stop
  // Toggle-to-talk: tap to start, tap again to stop
  function handleTalkDown(e) {
    e.preventDefault();
    if (toggleToTalk) {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        stopRecording();
      } else {
        startRecording();
      }
    } else {
      startRecording();
    }
  }
  function handleTalkUp() {
    if (!toggleToTalk) stopRecording();
  }

  talkBtn.addEventListener('mousedown', handleTalkDown);
  talkBtn.addEventListener('mouseup', handleTalkUp);
  talkBtn.addEventListener('mouseleave', handleTalkUp);
  talkBtn.addEventListener('touchstart', handleTalkDown);
  talkBtn.addEventListener('touchend', handleTalkUp);
  talkBtn.addEventListener('touchcancel', handleTalkUp);

  resetBtn.addEventListener('click', () => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'reset' }));
      userText.textContent = '';
      assistText.textContent = '';
    }
  });

  connect();
})();
</script>
</body>
</html>
