<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Octavius</title>
<link rel="icon" type="image/png" href="/static/octavius-dapper_cyber_punk.png">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<link rel="manifest" href="/static/manifest.json">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="/static/app-common.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
    background: #0a0a0f;
    color: #c8c8d0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 1.5rem 1rem;
    max-width: 448px;
    margin: 0 auto;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #6a6a7a;
    margin-bottom: 0.6rem;
  }

  /* Mode toggles below title */
  #mode-toggles {
    display: flex;
    gap: 1.2rem;
    margin-bottom: 1.4rem;
  }

  .mode-toggle {
    position: relative;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.3rem;
    transition: all 0.2s;
  }

  .mode-toggle svg {
    width: 20px;
    height: 20px;
    fill: none;
    stroke: #60a0ff;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.2s, opacity 0.2s;
    opacity: 0.7;
  }

  .mode-toggle:hover svg { opacity: 1; }

  .mode-toggle.off svg { stroke: #444; opacity: 0.4; }

  .mode-toggle .strike {
    position: absolute;
    top: 50%; left: 50%;
    width: 28px;
    height: 0;
    border-top: 1.5px solid #ff5555;
    transform: translate(-50%, -50%) rotate(-45deg);
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }

  .mode-toggle.off .strike { opacity: 0.8; }

  .mode-label {
    font-size: 0.55rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #555;
    text-align: center;
    margin-top: 0.15rem;
  }

  .mode-toggle.off .mode-label { color: #333; }

  #status {
    font-size: 0.85rem;
    color: #8888a0;
    margin-bottom: 1.2rem;
    min-height: 1.2em;
    transition: color 0.2s;
  }

  #status.active { color: #60a0ff; }

  /* Talk button */
  #talk-btn {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 2px solid #333;
    background: #151520;
    color: #8888a0;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    -webkit-user-select: none;
    box-shadow: 0 0 20px rgba(96, 160, 255, 0.08), 0 0 40px rgba(96, 160, 255, 0.04);
    flex-shrink: 0;
  }

  #talk-btn:hover {
    border-color: #555;
    color: #aaa;
    box-shadow: 0 0 25px rgba(96, 160, 255, 0.14), 0 0 50px rgba(96, 160, 255, 0.06);
  }
  #talk-btn.recording {
    border-color: #ff4444;
    background: #201015;
    color: #ff6666;
    box-shadow: 0 0 30px rgba(255, 68, 68, 0.2), 0 0 60px rgba(255, 68, 68, 0.08);
  }
  #talk-btn.continuous-active {
    border-color: #44bb88;
    background: #101f18;
    color: #66ddaa;
    box-shadow: 0 0 30px rgba(68, 187, 136, 0.2), 0 0 60px rgba(68, 187, 136, 0.08);
  }
  #talk-btn.continuous-active.recording {
    border-color: #ff4444;
    background: #201015;
    color: #ff6666;
    box-shadow: 0 0 30px rgba(255, 68, 68, 0.2), 0 0 60px rgba(255, 68, 68, 0.08);
  }
  #talk-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    box-shadow: none;
  }

  /* Text input (visible when STT off) */
  #text-input-area {
    display: none;
    width: 100%;
  }

  #text-input-area.visible { display: flex; gap: 0.5rem; }

  #text-input {
    flex: 1;
    background: #151520;
    border: 1px solid #2a2a35;
    border-radius: 6px;
    color: #c8c8d0;
    font-family: inherit;
    font-size: 0.9rem;
    padding: 0.7rem 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  #text-input:focus { border-color: #60a0ff; }

  #text-input::placeholder { color: #444; }

  #text-send {
    background: #151520;
    border: 1px solid #2a2a35;
    border-radius: 6px;
    color: #8888a0;
    padding: 0.7rem 1rem;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  #text-send:hover { border-color: #555; color: #ccc; }
  #text-send:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Transcript area — collapsible text blocks */
  #transcript-area {
    margin-top: 1.2rem;
    width: 100%;
    text-align: left;
  }

  .msg-block {
    margin-bottom: 0.8rem;
    position: relative;
  }

  .msg-block .label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 0.2rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .msg-block .label:hover { color: #777; }

  .expand-btn {
    background: none;
    border: none;
    color: #555;
    font-size: 0.7rem;
    cursor: pointer;
    padding: 0 0.2rem;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .expand-btn:hover { color: #888; }

  /* User text — compact by default */
  .msg-content {
    font-size: 0.85rem;
    line-height: 1.45;
    color: #999;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }

  .msg-content.user-text {
    max-height: 2.9em; /* ~2 lines */
  }

  .msg-content.user-text.expanded {
    max-height: none;
  }

  /* Assistant text — more room, still capped */
  .msg-content.assist-text {
    color: #d0d0e0;
    max-height: 12em; /* ~8 lines */
    font-size: 0.88rem;
  }

  .msg-content.assist-text.expanded {
    max-height: none;
  }

  /* Markdown styles inside assistant text */
  .msg-content.assist-text p { margin-bottom: 0.5em; }
  .msg-content.assist-text p:last-child { margin-bottom: 0; }
  .msg-content.assist-text ul, .msg-content.assist-text ol {
    margin: 0.3em 0 0.5em 1.2em;
  }
  .msg-content.assist-text li { margin-bottom: 0.2em; }
  .msg-content.assist-text strong { color: #e0e0f0; }
  .msg-content.assist-text em { color: #b0b0d0; }
  .msg-content.assist-text code {
    background: #1a1a28;
    padding: 0.1em 0.3em;
    border-radius: 3px;
    font-size: 0.82em;
  }
  .msg-content.assist-text pre {
    background: #1a1a28;
    padding: 0.6em 0.8em;
    border-radius: 4px;
    overflow-x: auto;
    margin: 0.4em 0;
  }
  .msg-content.assist-text pre code {
    background: none;
    padding: 0;
  }
  .msg-content.assist-text a { color: #60a0ff; }

  /* Full conversation link */
  .full-conv-link {
    font-size: 0.6rem;
    color: #555;
    cursor: pointer;
    margin-left: auto;
    letter-spacing: 0.05em;
    transition: color 0.2s;
    user-select: none;
    -webkit-user-select: none;
  }
  .full-conv-link:hover { color: #888; }

  /* Full conversation panel */
  #full-conv-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    z-index: 100;
  }
  #full-conv-overlay.open { display: flex; align-items: center; justify-content: center; }

  #full-conv-panel {
    background: #0a0a0f;
    border: 1px solid #2a2a35;
    border-radius: 8px;
    width: 95vw;
    max-width: 448px;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #full-conv-header {
    padding: 0.8rem 1rem;
    border-bottom: 1px solid #2a2a35;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #full-conv-header h2 {
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #6a6a7a;
  }

  #full-conv-close {
    background: none;
    border: none;
    color: #555;
    font-size: 1rem;
    cursor: pointer;
    padding: 0.2rem;
  }
  #full-conv-close:hover { color: #888; }

  #full-conv-messages {
    flex: 1;
    overflow-y: auto;
    padding: 0.8rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .conv-msg {
    font-size: 0.82rem;
    line-height: 1.5;
    padding: 0.5rem 0.7rem;
    border-radius: 6px;
    max-width: 90%;
    word-break: break-word;
  }
  .conv-msg.user {
    background: #1a1a2a;
    color: #b0b0d0;
    align-self: flex-end;
  }
  .conv-msg.assistant {
    background: #151520;
    color: #d0d0e0;
    align-self: flex-start;
  }
  .conv-msg.assistant p { margin-bottom: 0.4em; }
  .conv-msg.assistant p:last-child { margin-bottom: 0; }
  .conv-msg.assistant ul, .conv-msg.assistant ol { margin: 0.3em 0 0.4em 1.1em; }
  .conv-msg.assistant li { margin-bottom: 0.15em; }
  .conv-msg.assistant strong { color: #e0e0f0; }
  .conv-msg.assistant code { background: #1a1a28; padding: 0.1em 0.3em; border-radius: 3px; font-size: 0.85em; }

  .conv-empty {
    color: #555;
    font-size: 0.8rem;
    text-align: center;
    padding: 2rem 0;
  }

  /* Overflow fade when collapsed */
  .msg-content.overflowing::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2em;
    background: linear-gradient(transparent, #0a0a0f);
    pointer-events: none;
  }
  .msg-content.expanded.overflowing::after { display: none; }

  /* Top-right controls */
  #top-left, #top-right {
    position: fixed;
    top: 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
    z-index: 10;
  }
  #top-left { left: 0.8rem; }
  #top-right { right: 0.8rem; }

  .top-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.5rem;
    line-height: 1;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 44px;
    min-height: 44px;
  }

  .top-btn img {
    width: 32px;
    height: 32px;
    opacity: 0.55;
    transition: opacity 0.2s;
  }
  .top-btn:hover img { opacity: 0.85; }

  #inbox-link { position: relative; }

  #inbox-badge {
    display: none;
    position: absolute;
    top: 2px;
    right: 2px;
    background: #60a0ff;
    color: #0a0a0f;
    font-size: 0.55rem;
    font-weight: 700;
    min-width: 14px;
    height: 14px;
    line-height: 14px;
    text-align: center;
    border-radius: 7px;
    padding: 0 3px;
  }

  /* Settings panel */
  #settings-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 100;
  }
  #settings-overlay.open { display: flex; align-items: center; justify-content: center; }

  #settings-panel {
    background: #12121a;
    border: 1px solid #2a2a35;
    border-radius: 8px;
    padding: 1.8rem 2rem;
    width: 320px;
    max-width: 90vw;
  }

  #settings-panel h2 {
    font-size: 0.8rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #6a6a7a;
    margin-bottom: 1.4rem;
  }

  .setting-group {
    margin-bottom: 1.2rem;
  }

  .setting-group label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 0.4rem;
  }

  .setting-group select {
    width: 100%;
    background: #1a1a25;
    border: 1px solid #2a2a35;
    color: #c8c8d0;
    padding: 0.45rem 0.5rem;
    font-size: 0.85rem;
    font-family: inherit;
    border-radius: 4px;
    cursor: pointer;
  }
  .setting-group select:focus { outline: 1px solid #60a0ff; border-color: #60a0ff; }

  .setting-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .setting-row input[type="range"] {
    flex: 1;
    accent-color: #60a0ff;
    cursor: pointer;
  }

  .setting-row span {
    font-size: 0.8rem;
    color: #8888a0;
    min-width: 2.8em;
    text-align: right;
  }

  .setting-row input[type="checkbox"] {
    accent-color: #60a0ff;
    cursor: pointer;
  }

  .setting-row .cb-label {
    font-size: 0.85rem;
    color: #8888a0;
    cursor: pointer;
    text-transform: none;
    letter-spacing: 0;
  }

  .panel-close {
    margin-top: 0.8rem;
    width: 100%;
    background: none;
    border: 1px solid #2a2a35;
    color: #666;
    padding: 0.45rem;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    font-family: inherit;
  }
  .panel-close:hover { border-color: #555; color: #999; }

  /* History panel */
  #history-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 100;
  }
  #history-overlay.open { display: flex; align-items: center; justify-content: center; }

  #history-panel {
    background: #12121a;
    border: 1px solid #2a2a35;
    border-radius: 8px;
    padding: 1.4rem 1.4rem;
    width: 380px;
    max-width: 90vw;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
  }

  #history-panel h2 {
    font-size: 0.8rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #6a6a7a;
    margin-bottom: 1rem;
  }

  #history-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-bottom: 0.8rem;
  }

  .history-item {
    background: #151520;
    border: 1px solid #2a2a35;
    border-radius: 6px;
    padding: 0.7rem 0.8rem;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .history-item:hover { border-color: #60a0ff; }

  .history-item .hi-date {
    font-size: 0.65rem;
    color: #555;
    margin-bottom: 0.2rem;
  }

  .history-item .hi-summary {
    font-size: 0.8rem;
    color: #aaa;
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .history-item .hi-tags {
    margin-top: 0.3rem;
    display: flex;
    gap: 0.3rem;
    flex-wrap: wrap;
  }

  .history-item .hi-tag {
    font-size: 0.55rem;
    color: #6a8abf;
    background: #1a1a2a;
    padding: 0.1rem 0.35rem;
    border-radius: 3px;
  }

  .history-empty {
    text-align: center;
    color: #555;
    font-size: 0.8rem;
    padding: 2rem 0;
  }

  /* Bottom controls */
  #bottom-controls {
    margin-top: 1rem;
    display: flex;
    gap: 0.5rem;
  }

  .ctrl-btn {
    background: none;
    border: 1px solid #2a2a35;
    color: #555;
    padding: 0.35rem 0.8rem;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    font-family: inherit;
  }

  .ctrl-btn:hover { border-color: #555; color: #888; }

  #stop-btn {
    display: none;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1.5px solid #ff5555;
    background: #1a1015;
    color: #ff6666;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    z-index: 50;
    box-shadow: 0 0 15px rgba(255, 85, 85, 0.1);
  }
  #stop-btn:hover {
    background: #251520;
    box-shadow: 0 0 20px rgba(255, 85, 85, 0.2);
  }
  #stop-btn.visible { display: block; }
</style>
</head>
<body>

<div id="top-left">
  <button class="top-btn" id="settings-btn" title="Settings"><img src="/static/icon-settings.png" alt="Settings"></button>
  <button class="top-btn" id="history-btn" title="Conversation history"><img src="/static/icon-conversation_history.png" alt="History"></button>
</div>
<div id="top-right">
  <a id="inbox-link" class="top-btn" href="/inbox" title="Knowledge Inbox"><img src="/static/icon-knowledge_inbox.png" alt="Inbox"><span id="inbox-badge"></span></a>
  <a class="top-btn" href="/reader" title="Document Reader"><img src="/static/icon-reading.png" alt="Reader"></a>
</div>

<!-- Settings overlay -->
<div id="settings-overlay">
  <div id="settings-panel">
    <h2>Settings</h2>

    <div class="setting-group">
      <label for="voice-select">Voice</label>
      <select id="voice-select"></select>
    </div>

    <div class="setting-group">
      <label>Speed</label>
      <div class="setting-row">
        <input type="range" id="speed-slider" min="1.0" max="2.0" step="0.1" value="1.4">
        <span id="speed-value">1.4x</span>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-row">
        <input type="checkbox" id="trim-cb" checked>
        <span class="cb-label" onclick="document.getElementById('trim-cb').click()">Trim silence</span>
      </div>
    </div>

    <div class="setting-group">
      <label for="talk-mode-select">Talk mode</label>
      <select id="talk-mode-select">
        <option value="hold">Hold to talk</option>
        <option value="toggle">Tap to talk</option>
        <option value="continuous">Continuous conversation</option>
      </select>
    </div>

    <button class="panel-close" id="settings-close">Done</button>
  </div>
</div>

<!-- History overlay -->
<div id="history-overlay">
  <div id="history-panel">
    <h2>Previous Conversations</h2>
    <div id="history-list"></div>
    <button class="panel-close" id="history-close">Cancel</button>
  </div>
</div>

<h1>Octavius</h1>

<div id="mode-toggles">
  <button class="mode-toggle" id="stt-toggle" title="Speech input">
    <svg viewBox="0 0 24 24">
      <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
    </svg>
    <div class="strike"></div>
    <div class="mode-label">voice in</div>
  </button>
  <button class="mode-toggle" id="tts-toggle" title="Audio output">
    <svg viewBox="0 0 24 24">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
    </svg>
    <div class="strike"></div>
    <div class="mode-label">voice out</div>
  </button>
</div>

<div id="status">Connecting...</div>
<button id="talk-btn" disabled>HOLD TO<br>TALK</button>

<div id="text-input-area">
  <input type="text" id="text-input" placeholder="Type your message..." autocomplete="off">
  <button id="text-send" disabled>Send</button>
</div>

<div id="transcript-area">
  <div class="msg-block" id="user-block" style="display:none">
    <div class="label" id="user-label">
      You
      <button class="expand-btn" id="user-expand" title="Expand">&#9660;</button>
    </div>
    <div class="msg-content user-text" id="user-text"></div>
  </div>

  <div class="msg-block" id="assist-block" style="display:none">
    <div class="label" id="assist-label">
      Octavius
      <button class="expand-btn" id="assist-expand" title="Expand">&#9660;</button>
      <span class="full-conv-link" id="full-conv-btn">Full Conversation</span>
    </div>
    <div class="msg-content assist-text" id="assistant-text"></div>
  </div>
</div>

<!-- Full conversation overlay -->
<div id="full-conv-overlay">
  <div id="full-conv-panel">
    <div id="full-conv-header">
      <h2>Conversation</h2>
      <button id="full-conv-close">&times;</button>
    </div>
    <div id="full-conv-messages"></div>
  </div>
</div>

<div id="bottom-controls">
  <button class="ctrl-btn" id="reset-btn">Reset</button>
  <button class="ctrl-btn" id="history-btn-bottom">History</button>
</div>
